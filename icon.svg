<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1f"/>
      <stop offset="100%" style="stop-color:#0d0d0f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c98e"/>
      <stop offset="100%" style="stop-color:#c8a96e"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="512" height="512" rx="112" fill="none" stroke="#c8a96e" stroke-width="8" opacity="0.3"/>
  <!-- K letter -->
  <text
    x="256" y="360"
    font-family="Georgia, 'Playfair Display', serif"
    font-weight="900"
    font-size="340"
    text-anchor="middle"
    fill="url(#gold)"
    letter-spacing="-10"
  >K</text>
</svg>
